<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">How It All Fits Together</text>

  <!-- ==================== COLUMN 1: CODING ==================== -->

  <!-- Column header -->
  <rect x="30" y="62" width="260" height="36" rx="18" fill="#dbeafe"/>
  <text x="160" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af" letter-spacing="1.5">CODING</text>
  <text x="160" y="115" text-anchor="middle" font-size="11" fill="#64748b">Your Computer</text>

  <!-- Claude Code box -->
  <rect x="50" y="135" width="220" height="80" rx="12" fill="url(#gradPurple)" filter="url(#shadow)"/>
  <text x="160" y="168" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">AI Assistant</text>
  <text x="160" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="white">Claude Code</text>

  <!-- Arrow down -->
  <line x1="160" y1="215" x2="160" y2="240" stroke="#94a3b8" stroke-width="2"/>
  <text x="175" y="233" font-size="9" fill="#94a3b8">writes</text>

  <!-- Your Code box -->
  <rect x="50" y="245" width="220" height="80" rx="12" fill="url(#gradBlue)" filter="url(#shadow)"/>
  <text x="160" y="278" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Your Project</text>
  <text x="160" y="302" text-anchor="middle" font-size="18" font-weight="700" fill="white">Code &amp; Files</text>

  <!-- Terminal hint -->
  <rect x="65" y="345" width="190" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="365" text-anchor="middle" font-size="10" fill="#64748b">You type in your terminal:</text>
  <text x="160" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed" font-family="monospace">claude</text>

  <!-- ==================== COLUMN 2: VERSIONING ==================== -->

  <!-- Column header -->
  <rect x="320" y="62" width="260" height="36" rx="18" fill="#dcfce7"/>
  <text x="450" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" letter-spacing="1.5">VERSIONING</text>
  <text x="450" y="115" text-anchor="middle" font-size="11" fill="#64748b">Cloud Backup &amp; Collaboration</text>

  <!-- GitHub box -->
  <rect x="340" y="135" width="220" height="80" rx="12" fill="url(#gradGreen)" filter="url(#shadow)"/>
  <text x="450" y="168" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Code Repository</text>
  <text x="450" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="white">GitHub</text>

  <!-- Arrow down -->
  <line x1="450" y1="215" x2="450" y2="240" stroke="#94a3b8" stroke-width="2"/>
  <text x="465" y="233" font-size="9" fill="#94a3b8">tracks</text>

  <!-- Features box -->
  <rect x="340" y="245" width="220" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="450" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">What GitHub Does</text>
  <text x="450" y="292" text-anchor="middle" font-size="11" fill="#4ade80">&#x2713; Version history of every change</text>
  <text x="450" y="308" text-anchor="middle" font-size="11" fill="#4ade80">&#x2713; Team collaboration &amp; reviews</text>

  <!-- git push hint -->
  <rect x="355" y="345" width="190" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="365" text-anchor="middle" font-size="10" fill="#64748b">You (or Claude) run:</text>
  <text x="450" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a" font-family="monospace">git push</text>

  <!-- ==================== COLUMN 3: HOSTING ==================== -->

  <!-- Column header -->
  <rect x="610" y="62" width="260" height="36" rx="18" fill="#ffedd5"/>
  <text x="740" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" letter-spacing="1.5">HOSTING</text>
  <text x="740" y="115" text-anchor="middle" font-size="11" fill="#64748b">Your App Goes Live</text>

  <!-- Path A: Railway -->
  <rect x="630" y="135" width="220" height="80" rx="12" fill="url(#gradOrange)" filter="url(#shadow)"/>
  <text x="740" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">PATH A — SIMPLE</text>
  <text x="740" y="182" text-anchor="middle" font-size="18" font-weight="700" fill="white">Railway</text>
  <text x="740" y="200" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">~$5/mo · deploy in 10 min</text>

  <!-- OR divider -->
  <rect x="725" y="222" width="30" height="18" rx="9" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="740" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">or</text>

  <!-- Path B: Azure -->
  <rect x="630" y="248" width="220" height="80" rx="12" fill="url(#gradCyan)" filter="url(#shadow)"/>
  <text x="740" y="271" text-anchor="middle" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">PATH B — BUSINESS</text>
  <text x="740" y="295" text-anchor="middle" font-size="18" font-weight="700" fill="white">Azure</text>
  <text x="740" y="313" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">~$40/mo · enterprise ready</text>

  <!-- Auto-deploy hint -->
  <rect x="645" y="345" width="190" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="740" y="365" text-anchor="middle" font-size="10" fill="#64748b">Deploys automatically on</text>
  <text x="740" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#ea580c" font-family="monospace">git push</text>

  <!-- ==================== ARROWS BETWEEN COLUMNS ==================== -->

  <!-- Arrow: Coding → Versioning -->
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <line x1="270" y1="175" x2="335" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)" stroke-dasharray="6,4"/>
  <text x="302" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">push</text>

  <!-- Arrow: Versioning → Hosting -->
  <line x1="560" y1="175" x2="625" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)" stroke-dasharray="6,4"/>
  <text x="592" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">deploy</text>

  <!-- Arrow: Versioning → Hosting (Azure) -->
  <path d="M 560 190 Q 592 190 592 265 L 625 265" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)" stroke-dasharray="6,4" fill="none"/>

  <!-- ==================== BOTTOM SUMMARY ==================== -->

  <rect x="30" y="420" width="840" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Flow summary -->
  <text x="450" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">The Flow</text>

  <!-- Step boxes -->
  <rect x="80" y="458" width="150" height="30" rx="8" fill="url(#gradPurple)"/>
  <text x="155" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="white">You + Claude Code</text>

  <text x="245" y="478" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>

  <rect x="265" y="458" width="110" height="30" rx="8" fill="url(#gradGreen)"/>
  <text x="320" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="white">git push</text>

  <text x="390" y="478" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>

  <rect x="405" y="458" width="110" height="30" rx="8" fill="#0f172a"/>
  <text x="460" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="white">GitHub</text>

  <text x="530" y="478" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>

  <rect x="545" y="458" width="140" height="30" rx="8" fill="url(#gradOrange)"/>
  <text x="615" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="white">Auto-Deploy</text>

  <text x="700" y="478" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>

  <rect x="715" y="458" width="100" height="30" rx="8" fill="url(#gradCyan)"/>
  <text x="765" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="white">App is Live!</text>
</svg>