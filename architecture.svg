<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="gradRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">How It All Fits Together</text>

  <!-- ==================== PHASE 1: CONCEPT ==================== -->

  <rect x="30" y="62" width="190" height="36" rx="18" fill="#ffe4e6"/>
  <text x="125" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#9f1239" letter-spacing="1.5">CONCEPT</text>
  <text x="125" y="115" text-anchor="middle" font-size="11" fill="#64748b">Ideas &amp; Mockups</text>

  <rect x="35" y="135" width="180" height="80" rx="12" fill="url(#gradRose)" filter="url(#shadow)"/>
  <text x="125" y="163" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Brainstorm &amp; Design</text>
  <text x="125" y="187" text-anchor="middle" font-size="17" font-weight="700" fill="white">Claude.ai</text>

  <rect x="42" y="225" width="166" height="52" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="125" y="245" text-anchor="middle" font-size="10" fill="#9f1239">What you do here:</text>
  <text x="125" y="260" text-anchor="middle" font-size="10" fill="#fb7185">Describe your idea, get mockups,</text>
  <text x="125" y="272" text-anchor="middle" font-size="10" fill="#fb7185">plan features, refine concepts</text>

  <!-- Arrow: Concept → Coding -->
  <line x1="215" y1="175" x2="248" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)" stroke-dasharray="6,4"/>

  <!-- ==================== PHASE 2: CODING ==================== -->

  <rect x="250" y="62" width="190" height="36" rx="18" fill="#ede9fe"/>
  <text x="345" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" letter-spacing="1.5">CODING</text>
  <text x="345" y="115" text-anchor="middle" font-size="11" fill="#64748b">Your Computer</text>

  <rect x="255" y="135" width="180" height="80" rx="12" fill="url(#gradPurple)" filter="url(#shadow)"/>
  <text x="345" y="163" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">AI writes your code</text>
  <text x="345" y="187" text-anchor="middle" font-size="17" font-weight="700" fill="white">Claude Code</text>

  <rect x="262" y="225" width="166" height="52" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="345" y="245" text-anchor="middle" font-size="10" fill="#5b21b6">What you do here:</text>
  <text x="345" y="260" text-anchor="middle" font-size="10" fill="#8b5cf6">Describe features in plain English,</text>
  <text x="345" y="272" text-anchor="middle" font-size="10" fill="#8b5cf6">Claude builds them for you</text>

  <!-- Arrow: Coding → Versioning -->
  <line x1="435" y1="175" x2="468" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)" stroke-dasharray="6,4"/>
  <text x="452" y="168" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">push</text>

  <!-- ==================== PHASE 3: VERSIONING ==================== -->

  <rect x="470" y="62" width="190" height="36" rx="18" fill="#dcfce7"/>
  <text x="565" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" letter-spacing="1.5">VERSIONING</text>
  <text x="565" y="115" text-anchor="middle" font-size="11" fill="#64748b">Cloud Backup</text>

  <rect x="475" y="135" width="180" height="80" rx="12" fill="url(#gradGreen)" filter="url(#shadow)"/>
  <text x="565" y="163" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Code Repository</text>
  <text x="565" y="187" text-anchor="middle" font-size="17" font-weight="700" fill="white">GitHub</text>

  <rect x="482" y="225" width="166" height="52" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="565" y="245" text-anchor="middle" font-size="10" fill="#166534">What it does:</text>
  <text x="565" y="260" text-anchor="middle" font-size="10" fill="#4ade80">Saves every version of your code,</text>
  <text x="565" y="272" text-anchor="middle" font-size="10" fill="#4ade80">enables team collaboration</text>

  <!-- Arrow: Versioning → Hosting -->
  <line x1="655" y1="155" x2="688" y2="155" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)" stroke-dasharray="6,4"/>
  <text x="672" y="148" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">deploy</text>

  <!-- Arrow: Versioning → Hosting (Azure) -->
  <path d="M 655 195 Q 672 195 672 225 L 688 225" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)" stroke-dasharray="6,4" fill="none"/>

  <!-- ==================== PHASE 4: HOSTING ==================== -->

  <rect x="690" y="62" width="190" height="36" rx="18" fill="#ffedd5"/>
  <text x="785" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412" letter-spacing="1.5">HOSTING</text>
  <text x="785" y="115" text-anchor="middle" font-size="11" fill="#64748b">Your App Goes Live</text>

  <!-- Path A: Railway -->
  <rect x="695" y="135" width="180" height="55" rx="12" fill="url(#gradOrange)" filter="url(#shadow)"/>
  <text x="785" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">PATH A — SIMPLE</text>
  <text x="785" y="175" text-anchor="middle" font-size="16" font-weight="700" fill="white">Railway</text>

  <!-- OR -->
  <rect x="770" y="194" width="30" height="16" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="785" y="206" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">or</text>

  <!-- Path B: Azure -->
  <rect x="695" y="214" width="180" height="55" rx="12" fill="url(#gradCyan)" filter="url(#shadow)"/>
  <text x="785" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">PATH B — BUSINESS</text>
  <text x="785" y="254" text-anchor="middle" font-size="16" font-weight="700" fill="white">Azure</text>

  <!-- ==================== BOTTOM: THE FLOW ==================== -->

  <rect x="30" y="310" width="840" height="95" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="450" y="336" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Your Workflow — Step by Step</text>

  <!-- Step 1 -->
  <rect x="50" y="352" width="130" height="40" rx="10" fill="url(#gradRose)"/>
  <text x="115" y="368" text-anchor="middle" font-size="10" font-weight="600" fill="white">Describe your idea</text>
  <text x="115" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="white">Claude.ai</text>

  <text x="193" y="377" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- Step 2 -->
  <rect x="206" y="352" width="130" height="40" rx="10" fill="url(#gradPurple)"/>
  <text x="271" y="368" text-anchor="middle" font-size="10" font-weight="600" fill="white">Build it with AI</text>
  <text x="271" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="white">Claude Code</text>

  <text x="349" y="377" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- Step 3 -->
  <rect x="362" y="352" width="100" height="40" rx="10" fill="#0f172a"/>
  <text x="412" y="368" text-anchor="middle" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)">Save &amp; sync</text>
  <text x="412" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="white">git push</text>

  <text x="475" y="377" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- Step 4 -->
  <rect x="488" y="352" width="120" height="40" rx="10" fill="url(#gradGreen)"/>
  <text x="548" y="368" text-anchor="middle" font-size="10" font-weight="600" fill="white">Stored on</text>
  <text x="548" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="white">GitHub</text>

  <text x="621" y="377" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- Step 5 -->
  <rect x="634" y="352" width="120" height="40" rx="10" fill="url(#gradOrange)"/>
  <text x="694" y="368" text-anchor="middle" font-size="10" font-weight="600" fill="white">Auto-deploys to</text>
  <text x="694" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="white">Cloud</text>

  <text x="767" y="377" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- Step 6 -->
  <rect x="780" y="352" width="76" height="40" rx="10" fill="url(#gradCyan)"/>
  <text x="818" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="white">Live!</text>

  <!-- ==================== INTERACTIVE ASSISTANT CALLOUT ==================== -->

  <rect x="30" y="430" width="840" height="80" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>

  <text x="60" y="458" font-size="24">🚀</text>
  <text x="90" y="460" font-size="14" font-weight="700" fill="#9a3412">Don't want to read all this?</text>
  <text x="90" y="480" font-size="12" fill="#c2410c">Download the Setup Assistant file and upload it to Claude.ai — it will walk you through</text>
  <text x="90" y="496" font-size="12" fill="#c2410c">the entire setup process step by step, like a personal tutor. No reading required.</text>

  <!-- ==================== TOOLS LEGEND ==================== -->

  <rect x="30" y="530" width="840" height="75" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="555" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Tools You'll Use</text>

  <rect x="60" y="567" width="12" height="12" rx="3" fill="url(#gradRose)"/>
  <text x="78" y="578" font-size="11" fill="#64748b">Claude.ai — brainstorm &amp; design (browser)</text>

  <rect x="290" y="567" width="12" height="12" rx="3" fill="url(#gradPurple)"/>
  <text x="308" y="578" font-size="11" fill="#64748b">Claude Code — AI coding (terminal)</text>

  <rect x="510" y="567" width="12" height="12" rx="3" fill="url(#gradGreen)"/>
  <text x="528" y="578" font-size="11" fill="#64748b">GitHub — code storage (cloud)</text>

  <rect x="700" y="567" width="12" height="12" rx="3" fill="url(#gradOrange)"/>
  <text x="718" y="578" font-size="11" fill="#64748b">Railway / Azure — hosting</text>
</svg>