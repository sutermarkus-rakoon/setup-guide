<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="'Segoe UI','Open Sans',sans-serif">
  <defs>
    <linearGradient id="g-markus" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="g-anton" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0091DC"/><stop offset="100%" stop-color="#0077b6"/></linearGradient>
    <linearGradient id="g-benno" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="g-chasperli" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="g-donald" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="g-egon" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="g-fridolin" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="g-guschti" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="340" rx="16" fill="#f8fafc"/>

  <!-- Markus -->
  <rect x="310" y="20" width="140" height="52" rx="10" fill="url(#g-markus)" filter="url(#shadow)"/>
  <text x="380" y="41" text-anchor="middle" fill="white" font-weight="700" font-size="14">Markus</text>
  <text x="380" y="58" text-anchor="middle" fill="white" font-size="11" opacity="0.85">Product Owner</text>

  <!-- Connector Markus → Anton -->
  <line x1="380" y1="72" x2="380" y2="100" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="374,96 386,96 380,106" fill="#94a3b8"/>

  <!-- Anton -->
  <rect x="310" y="108" width="140" height="52" rx="10" fill="url(#g-anton)" filter="url(#shadow)"/>
  <text x="380" y="129" text-anchor="middle" fill="white" font-weight="700" font-size="14">Anton</text>
  <text x="380" y="146" text-anchor="middle" fill="white" font-size="11" opacity="0.85">Orchestrator</text>

  <!-- Connector Anton → horizontal bar -->
  <line x1="380" y1="160" x2="380" y2="188" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="65" y1="188" x2="695" y2="188" stroke="#94a3b8" stroke-width="2.5"/>

  <!-- Vertical connectors to agents -->
  <line x1="65" y1="188" x2="65" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="170" y1="188" x2="170" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="275" y1="188" x2="275" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="380" y1="188" x2="380" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="485" y1="188" x2="485" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="590" y1="188" x2="590" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <!-- Arrow tips -->
  <polygon points="59,206 71,206 65,214" fill="#94a3b8"/>
  <polygon points="164,206 176,206 170,214" fill="#94a3b8"/>
  <polygon points="269,206 281,206 275,214" fill="#94a3b8"/>
  <polygon points="374,206 386,206 380,214" fill="#94a3b8"/>
  <polygon points="479,206 491,206 485,214" fill="#94a3b8"/>
  <polygon points="584,206 596,206 590,214" fill="#94a3b8"/>

  <!-- Agent boxes -->
  <!-- Benno -->
  <rect x="15" y="216" width="100" height="52" rx="8" fill="url(#g-benno)" filter="url(#shadow)"/>
  <text x="65" y="237" text-anchor="middle" fill="white" font-weight="600" font-size="12">Benno</text>
  <text x="65" y="254" text-anchor="middle" fill="white" font-size="10" opacity="0.85">Planner</text>

  <!-- Chasperli -->
  <rect x="120" y="216" width="100" height="52" rx="8" fill="url(#g-chasperli)" filter="url(#shadow)"/>
  <text x="170" y="237" text-anchor="middle" fill="white" font-weight="600" font-size="12">Chasperli</text>
  <text x="170" y="254" text-anchor="middle" fill="white" font-size="10" opacity="0.85">Developer 1</text>

  <!-- Donald -->
  <rect x="225" y="216" width="100" height="52" rx="8" fill="url(#g-donald)" filter="url(#shadow)"/>
  <text x="275" y="237" text-anchor="middle" fill="white" font-weight="600" font-size="12">Donald</text>
  <text x="275" y="254" text-anchor="middle" fill="white" font-size="10" opacity="0.85">Developer 2</text>

  <!-- Egon -->
  <rect x="330" y="216" width="100" height="52" rx="8" fill="url(#g-egon)" filter="url(#shadow)"/>
  <text x="380" y="237" text-anchor="middle" fill="white" font-weight="600" font-size="12">Egon</text>
  <text x="380" y="254" text-anchor="middle" fill="white" font-size="10" opacity="0.85">Developer 3</text>

  <!-- Fridolin -->
  <rect x="435" y="216" width="100" height="52" rx="8" fill="url(#g-fridolin)" filter="url(#shadow)"/>
  <text x="485" y="237" text-anchor="middle" fill="white" font-weight="600" font-size="12">Fridolin</text>
  <text x="485" y="254" text-anchor="middle" fill="white" font-size="10" opacity="0.85">Quality Control</text>

  <!-- Guschti -->
  <rect x="540" y="216" width="100" height="52" rx="8" fill="url(#g-guschti)" filter="url(#shadow)"/>
  <text x="590" y="237" text-anchor="middle" fill="white" font-weight="600" font-size="12">Guschti</text>
  <text x="590" y="254" text-anchor="middle" fill="white" font-size="10" opacity="0.85">Plan &amp; Security</text>

  <!-- Legend -->
  <text x="380" y="300" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">
    Anton distributes tasks to all agents · Benno plans, Developers implement · Fridolin + Guschti review
  </text>

  <!-- Title -->
  <text x="380" y="332" text-anchor="middle" fill="#94a3b8" font-size="10">Team Organigramm — Multi-Session Team Mode</text>
</svg>
